.wiggle{animation:wiggle 1.8s infinite;transform-origin:bottom center;display:inline-block;}

function el(tag,props,html){

if(props)Object.keys(props).forEach(function(k){

else e.setAttribute(k,props[k]);
});
if(html!==undefined)e.innerHTML=html;
return e;
}

var greeting=hour<12?'おはよう☀️':hour<18?'こんにちは🌤':'こんばんは🌙';
var dc=tasks.filter(function(t){return doneMap[t.id];}).length;
var pct=tasks.length>0?(dc/tasks.length)*100:0;
var allDone=tasks.length>0&&tasks.every(function(t){return doneMap[t.id];});
var hdr=el('div',{style:{background:'white',borderRadius:'0 0 28px 28px',padding:'24px 20px 20px',boxShadow:'0 4px 24px rgba(0,0,0,0.07)',marginBottom:'24px'}});
var hdrTop=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}});
var hdrLeft=el('div',{});
hdrLeft.appendChild(el('div',{style:{fontSize:'12px',color:'#CCC',fontWeight:'700',marginBottom:'2px'}},new Date().toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'})));
hdrLeft.appendChild(el('div',{style:{fontSize:'24px',fontWeight:'900',color:'#222',lineHeight:'1.2'}},greeting));
hdrLeft.appendChild(el('div',{style:{fontSize:'13px',color:'#AAA',fontWeight:'600',marginTop:'2px'}},'今日も習慣を続けよう🌱'));
var hdrRight=el('div',{style:{display:'flex',gap:'8px'}});
var btnAlarm=el('button',{style:{background:'linear-gradient(135deg,#FFF8E0,#FFFBE8)',border:'2px solid #FFD84D44',borderRadius:'20px',padding:'8px 12px',fontWeight:'700',fontSize:'12px',color:'#B8860B'},onclick:showAlarm},'⏰');
var btnEdit=el('button',{style:{background:'linear-gradient(135deg,#F8F8F8,#F0F0F0)',border:'2px solid #EBEBEB',borderRadius:'20px',padding:'8px 16px',fontWeight:'700',fontSize:'12px',color:'#666'},onclick:showEdit},'✏️ 編集');
hdrRight.appendChild(btnAlarm);hdrRight.appendChild(btnEdit);
hdrTop.appendChild(hdrLeft);hdrTop.appendChild(hdrRight);
hdr.appendChild(hdrTop);
var prog=el('div',{style:{marginTop:'16px'}});
var progTop=el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'6px'}});
progTop.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'800',color:'#58CC02'}},allDone?'🎉 全部完了！':dc+' / '+tasks.length+' 完了'));
progTop.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'700',color:'#CCC'}},Math.round(pct)+'%'));
var bar=el('div',{style:{background:'#F0F0F0',borderRadius:'12px',height:'12px',overflow:'hidden'}});
var fill=el('div',{style:{height:'12px',borderRadius:'12px',background:allDone?'linear-gradient(90deg,#58CC02,#FFB800)':'linear-gradient(90deg,#58CC02,#89E219)',width:pct+'%',transition:'width 0.6s'}});
bar.appendChild(fill);prog.appendChild(progTop);prog.appendChild(bar);
hdr.appendChild(prog);root.appendChild(hdr);
var wrap=el('div',{style:{padding:'0 16px'}});
if(tasks.length===0){
var emp=el('div',{style:{textAlign:'center',padding:'48px 20px',background:'white',borderRadius:'24px',boxShadow:'0 4px 20px rgba(0,0,0,0.06)'}});
emp.appendChild(el('div',{style:{fontSize:'52px',marginBottom:'12px'}},'🌱'));
emp.appendChild(el('div',{style:{fontWeight:'800',color:'#222',fontSize:'16px',marginBottom:'16px'}},'習慣を追加してみよう！'));
var addBtn=el('button',{style:{background:'linear-gradient(135deg,#58CC02,#89E219)',border:'none',borderRadius:'16px',padding:'12px 28px',color:'white',fontWeight:'900',fontSize:'14px'},onclick:showEdit},'＋ 追加する');
emp.appendChild(addBtn);wrap.appendChild(emp);
}
tasks.forEach(function(t,i){
var c=getChar(t.cid);
var done=!!doneMap[t.id];
var msgs=done?c.done:c.urgent;
if(msgIdx[t.id]===undefined)msgIdx[t.id]=0;
var msg=msgs[msgIdx[t.id]%msgs.length];
var card=el('div',{style:{borderRadius:'24px',marginBottom:'16px',overflow:'hidden',boxShadow:done?'0 8px 32px '+c.color+'44':'0 4px 16px rgba(0,0,0,0.08)',border:'2.5px solid '+(done?c.color:'transparent'),transition:'all 0.35s'}});
card.className='fadein';
var top=el('div',{style:{background:done?'linear-gradient(135deg,'+c.color+','+c.color+'CC)':'linear-gradient(135deg,'+c.bg+','+c.bg+'88)',padding:'14px 18px 10px',display:'flex',justifyContent:'space-between',alignItems:'center'}});
var tLeft=el('div',{});
tLeft.appendChild(el('div',{style:{fontWeight:'900',fontSize:'17px',color:done?'white':'#222'}},t.name));
if(t.alarm)tLeft.appendChild(el('div',{style:{fontSize:'11px',color:done?'rgba(255,255,255,0.8)':'#BBB',fontWeight:'600',marginTop:'2px'}},'⏰ アラーム '+t.alarm));
var badge=el('div',{style:{background:done?'rgba(255,255,255,0.25)':'white',borderRadius:'20px',padding:'4px 10px',fontSize:'11px',fontWeight:'800',color:done?'white':c.color}},c.emoji+' '+c.name);
top.appendChild(tLeft);top.appendChild(badge);card.appendChild(top);
var body=el('div',{style:{background:'white',padding:'14px 18px 16px'}});
var row=el('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px'}});
var charWrap=el('div',{style:{flexShrink:'0'}});
charWrap.className=done?'bounce':'wiggle';
charWrap.innerHTML=svg(t.cid,done,68);
var bubble=el('div',{style:{background:done?c.color+'15':'#F8F8F8',border:'2px solid '+(done?c.color+'44':'#EBEBEB'),borderRadius:'16px 16px 16px 6px',padding:'10px 13px',fontSize:'12.5px',color:'#333',fontWeight:'600',lineHeight:'1.6',flex:'1'}});
bubble.appendChild(el('div',{style:{fontSize:'10px',color:c.color,fontWeight:'800',marginBottom:'3px'}},c.name));
bubble.appendChild(el('div',{},msg));
row.appendChild(charWrap);row.appendChild(bubble);body.appendChild(row);
var btn=el('button',{style:{width:'100%',padding:'13px',borderRadius:'16px',border:'none',background:done?'linear-gradient(135deg,'+c.color+','+c.color+'DD)':'#F3F3F3',color:done?'white':'#C0C0C0',fontWeight:'900',fontSize:'15px',boxShadow:done?'0 6px 20px '+c.color+'55':'none',transition:'all 0.25s'},onclick:function(){toggle(t.id);}},done?'✅ 今日はできた！':'やった！チェック ✓');
body.appendChild(btn);card.appendChild(body);wrap.appendChild(card);
});
var sb=tasks.filter(function(t){return streaks[t.id];});
if(sb.length>0){
var sk=el('div',{style:{background:'white',borderRadius:'20px',padding:'14px 18px',marginBottom:'16px',boxShadow:'0 2px 12px rgba(0,0,0,0.06)'}});
sk.appendChild(el('div',{style:{fontSize:'11px',fontWeight:'800',color:'#CCC',marginBottom:'10px'}},'🔥 連続記録'));
var sr=el('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}});
sb.forEach(function(t){
var c=getChar(t.cid);
var bd=el('div',{style:{background:c.bg,border:'2px solid '+c.color+'44',borderRadius:'12px',padding:'6px 12px',display:'flex',alignItems:'center',gap:'6px'}});
bd.appendChild(el('span',{style:{fontSize:'14px'}},c.emoji));
bd.appendChild(el('span',{style:{fontSize:'12px',fontWeight:'800',color:c.color}},t.name+' '+(streaks[t.id]||0)+'日連続'));
sr.appendChild(bd);
});
sk.appendChild(sr);wrap.appendChild(sk);
}
if(allDone){
var cel=el('div',{style:{background:'linear-gradient(135deg,#58CC02,#89E219,#FFB800)',borderRadius:'24px',padding:'24px 20px',textAlign:'center',color:'white',boxShadow:'0 12px 40px rgba(88,204,2,0.4)'}});
cel.className='pop';
cel.appendChild(el('div',{style:{fontSize:'52px',marginBottom:'8px'}},'🎉'));
cel.appendChild(el('div',{style:{fontSize:'20px',fontWeight:'900',marginBottom:'4px'}},'今日のミッション完了！'));
cel.appendChild(el('div',{style:{fontSize:'13px',opacity:'0.9'}},'みんな大喜び✨ また明日もいっしょに頑張ろうね！'));
var cp=el('div',{style:{display:'flex',justifyContent:'center',gap:'4px',marginTop:'14px'}});
tasks.forEach(function(t){var sp=el('span',{});sp.innerHTML=svg(t.cid,true,40);cp.appendChild(sp);});
cel.appendChild(cp);wrap.appendChild(cel);
}
root.appendChild(wrap);
tasks.forEach(function(t){
setTimeout(function(){
setInterval(function(){msgIdx[t.id]=(msgIdx[t.id]||0)+1;render();},4000);
},Math.random()*2000);
});
}
function toggle(id){
doneMap[id]=!doneMap[id];
if(doneMap[id])streaks[id]=(streaks[id]||0)+1;
save();render();
}
function showAlarm(){
var ov=el('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.55)',zIndex:'200',display:'flex',alignItems:'flex-end'}});
var sh=el('div',{style:{background:'white',borderRadius:'28px 28px 0 0',width:'100%',maxHeight:'85vh',overflowY:'auto',padding:'0 0 40px',boxShadow:'0 -8px 40px rgba(0,0,0,0.2)'}});
var hnd=el('div',{style:{display:'flex',justifyContent:'center',padding:'14px 0 4px'}});
hnd.appendChild(el('div',{style:{width:'40px',height:'4px',borderRadius:'2px',background:'#DDD'}}));
sh.appendChild(hnd);
var si=el('div',{style:{padding:'8px 20px 0'}});
var top=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}});
top.appendChild(el('span',{style:{fontWeight:'900',fontSize:'19px',color:'#222'}},'⏰ アラームの設定方法'));
var cls=el('button',{style:{background:'#F3F3F3',border:'none',borderRadius:'20px',padding:'7px 16px',fontWeight:'700',color:'#666',fontSize:'13px'},onclick:function(){ov.remove();}},'閉じる');
top.appendChild(cls);si.appendChild(top);
var hint=el('div',{style:{background:'linear-gradient(135deg,#E8F9D0,#FFF8E0)',border:'2px solid #58CC0244',borderRadius:'18px',padding:'14px 16px',marginBottom:'20px'}});
hint.appendChild(el('div',{style:{fontSize:'13px',fontWeight:'800',color:'#3DAA00',marginBottom:'4px'}},'💡 ポイント'));
hint.appendChild(el('div',{style:{fontSize:'12px',color:'#666',lineHeight:'1.7'}},'Androidの時計アプリでアラームを設定して、ラベルに習慣名を入れるだけ！アラームが鳴ったらこのアプリを開いてね🌱'));
si.appendChild(hint);
tasks.forEach(function(t){
var c=getChar(t.cid);
var row=el('div',{style:{borderRadius:'18px',marginBottom:'12px',overflow:'hidden',border:'2px solid '+c.color+'33'}});
var th=el('div',{style:{background:'linear-gradient(135deg,'+c.bg+','+c.bg+'88)',padding:'10px 14px',display:'flex',alignItems:'center',gap:'10px'}});
var ci=el('span',{});ci.innerHTML=svg(t.cid,false,36);
th.appendChild(ci);
var td=el('div',{});
td.appendChild(el('div',{style:{fontWeight:'900',fontSize:'15px',color:'#222'}},t.name));
td.appendChild(el('div',{style:{fontSize:'11px',color:c.color,fontWeight:'700'}},c.emoji+' '+c.name+'が待ってるよ！'));
th.appendChild(td);row.appendChild(th);
var bd=el('div',{style:{background:'white',padding:'12px 16px'}});
bd.appendChild(el('div',{style:{fontSize:'12px',color:'#888',marginBottom:'10px',fontWeight:'600'}},'Androidの時計アプリでこう設定しよう：'));
[['1','時計アプリを開く'],['2','時刻を「'+(t.alarm||'好きな時間')+'」に設定'],['3','ラベルに「'+t.name+'の時間だよ！」と入力'],['4','繰り返しを「毎日」に設定して保存']].forEach(function(step){
var sr=el('div',{style:{display:'flex',gap:'10px',alignItems:'flex-start',marginBottom:'8px'}});
var sn=el('div',{style:{width:'22px',height:'22px',borderRadius:'50%',flexShrink:'0',background:c.color,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',fontWeight:'900'}},step[0]);
sr.appendChild(sn);sr.appendChild(el('div',{style:{fontSize:'13px',color:'#333',fontWeight:'600',paddingTop:'2px'}},step[1]));
bd.appendChild(sr);
});
row.appendChild(bd);si.appendChild(row);
});
sh.appendChild(si);ov.appendChild(sh);document.body.appendChild(ov);
}
function showEdit(){
var editTasks=tasks.map(function(t){return Object.assign({},t);});
var ov=el('div',{style:{position:'fixed',inset:'0',background:'rgba(0,0,0,0.55)',zIndex:'100',display:'flex',alignItems:'flex-end'}});
var sh=el('div',{style:{background:'white',borderRadius:'28px 28px 0 0',width:'100%',maxHeight:'92vh',overflowY:'auto',padding:'0 0 40px',boxShadow:'0 -8px 40px rgba(0,0,0,0.2)'}});
var hnd=el('div',{style:{display:'flex',justifyContent:'center',padding:'14px 0 4px'}});
hnd.appendChild(el('div',{style:{width:'40px',height:'4px',borderRadius:'2px',background:'#DDD'}}));
sh.appendChild(hnd);
var si=el('div',{style:{padding:'8px 20px 0'}});
function reRender(){
si.innerHTML='';
var top=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}});
top.appendChild(el('span',{style:{fontWeight:'900',fontSize:'19px',color:'#222'}},'習慣を編集'));
var cls=el('button',{style:{background:'#F3F3F3',border:'none',borderRadius:'20px',padding:'7px 16px',fontWeight:'700',color:'#666',fontSize:'13px'},onclick:function(){ov.remove();}},'閉じる');
top.appendChild(cls);si.appendChild(top);
editTasks.forEach(function(t,idx){
var c=getChar(t.cid);
var card=el('div',{style:{borderRadius:'20px',marginBottom:'14px',overflow:'hidden',border:'2px solid '+c.color+'33',boxShadow:'0 2px 12px '+c.color+'15'}});
var th=el('div',{style:{background:'linear-gradient(135deg,'+c.bg+','+c.bg+'88)',padding:'12px 14px',display:'flex',gap:'8px',alignItems:'center'}});
var inp=el('input',{style:{flex:'1',border:'2px solid '+c.color+'44',borderRadius:'10px',padding:'8px 12px',fontWeight:'800',fontSize:'15px',outline:'none',background:'white',color:'#222'},value:t.name});
inp.oninput=function(){editTasks[idx].name=this.value;};
var del=el('button',{style:{background:'#FFE8E8',border:'none',borderRadius:'10px',padding:'8px 12px',color:'#E85555',fontWeight:'700',fontSize:'12px'},onclick:function(){editTasks.splice(idx,1);reRender();}},'削除');
th.appendChild(inp);th.appendChild(del);card.appendChild(th);
var bd=el('div',{style:{padding:'12px 14px',background:'white'}});
bd.appendChild(el('div',{style:{fontSize:'11px',color:'#AAA',fontWeight:'800',marginBottom:'8px'}},'キャラクターを選ぶ'));
var cr=el('div',{style:{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'8px'}});
CHARS.forEach(function(ch){
var cb=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',cursor:'pointer',padding:'8px 5px',borderRadius:'14px',minWidth:'66px',flexShrink:'0',border:'2.5px solid '+(t.cid===ch.id?ch.color:'#EEE'),background:t.cid===ch.id?ch.bg:'#FAFAFA'}});
cb.innerHTML=svg(ch.id,false,42);
cb.appendChild(el('span',{style:{fontSize:'10px',fontWeight:'800',color:t.cid===ch.id?ch.color:'#BBB'}},ch.name));
cb.onclick=function(){editTasks[idx].cid=ch.id;reRender();};
cr.appendChild(cb);
});
bd.appendChild(cr);
var alm=el('div',{style:{marginTop:'6px',padding:'10px 12px',background:'#F8F8F8',borderRadius:'12px'}});
alm.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'700',color:'#555',marginBottom:'6px'}},'⏰ アラームの目安時刻（メモ用）'));
var ti=el('input',{type:'time',style:{width:'100%',border:'2px solid '+c.color+'44',borderRadius:'10px',padding:'9px 12px',fontSize:'17px',fontWeight:'800',outline:'none',color:c.color,background:'white'},value:t.alarm||'08:00'});
ti.oninput=function(){editTasks[idx].alarm=this.value;};
alm.appendChild(ti);
alm.appendChild(el('div',{style:{fontSize:'11px',color:'#BBB',marginTop:'6px',fontWeight:'600'}},'※ この時刻をAndroidの時計アプリに設定してね'));
bd.appendChild(alm);card.appendChild(bd);si.appendChild(card);
});
var addBtn=el('button',{style:{width:'100%',padding:'13px',borderRadius:'16px',border:'2.5px dashed #DDD',background:'white',color:'#CCC',fontWeight:'800',fontSize:'14px',marginBottom:'14px'},onclick:function(){editTasks.push({id:Date.now().toString(),name:'新しい習慣',cid:'parrot',alarm:'08:00'});reRender();}},'＋ 習慣を追加');
si.appendChild(addBtn);
var sav=el('button',{style:{width:'100%',padding:'15px',borderRadius:'16px',border:'none',background:'linear-gradient(135deg,#58CC02,#89E219)',color:'white',fontWeight:'900',fontSize:'16px',boxShadow:'0 6px 20px #58CC0244'},onclick:function(){
tasks=editTasks.map(function(t){return Object.assign({},t);});
var nd={};tasks.forEach(function(t){if(doneMap[t.id])nd[t.id]=true;});
doneMap=nd;save();ov.remove();render();
}},'保存する ✓');
si.appendChild(sav);
}
reRender();
sh.appendChild(si);ov.appendChild(sh);document.body.appendChild(ov);
}
window.showAlarm=showAlarm;
window.showEdit=showEdit;
window.toggle=toggle;
render();
</script>
</body>
</html>
